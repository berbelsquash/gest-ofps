{% extends 'base.html' %}

{% block titulo %}Entrar — Gestão FPS{% endblock %}

{% block conteudo %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-marca">
      <span class="logo">FPS</span>
      <span class="marca-texto">
        <strong>Gestão FPS</strong>
        <small>Federação Paulista de Squash</small>
      </span>
    </div>

    <h1>Entrar</h1>
    <p class="login-sub">Acesso restrito à equipe da FPS</p>

    {% if form.errors %}
    <p class="erro">Usuário ou senha inválidos. Tente novamente.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Usuário
        <input type="text" name="username" autocomplete="username" autofocus required>
      </label>
      <label>Senha
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Entrar</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</div>
{% endblock %}
